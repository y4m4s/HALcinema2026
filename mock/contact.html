<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせ | HAL シネマ</title>
  <link rel="stylesheet" href="css/fonts.css">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <div id="nav-root"></div>

  <div class="page page-enter">
    <div class="section">
      <div class="section-header">
        <h2 class="section-title">お問い合わせ</h2>
        <span class="section-title-en">Contact</span>
        <div class="section-line"></div>
      </div>

      <div id="sent-section" style="display:none;text-align:center;padding:80px 40px">
        <div style="font-family:var(--mono);font-size:10px;letter-spacing:.3em;color:var(--accent2);margin-bottom:20px">
          SENT</div>
        <div style="font-family:var(--serif);font-size:24px;color:#dde4f0;margin-bottom:12px">送信が完了しました</div>
        <p style="color:var(--text2);font-size:14px;line-height:1.8">お問い合わせありがとうございます。<br>担当者より2〜3営業日以内にご連絡いたします。</p>
        <a href="index.html" class="btn-primary" style="margin-top:32px;display:inline-block">トップに戻る</a>
      </div>

      <div id="form-section" class="contact-grid">
        <form id="contact-form">
          <div class="form-group">
            <label class="form-label">お名前 *</label>
            <input class="form-input" name="name" required placeholder="山田 太郎">
          </div>
          <div class="form-group">
            <label class="form-label">メールアドレス *</label>
            <input class="form-input" type="email" name="email" required placeholder="example@email.com">
          </div>
          <div class="form-group">
            <label class="form-label">お問い合わせ種別</label>
            <select class="form-select" name="category">
              <option value="">選択してください</option>
              <option value="上映情報">上映情報</option>
              <option value="チケット・料金">チケット・料金</option>
              <option value="施設・設備">施設・設備</option>
              <option value="イベント">イベント</option>
              <option value="その他">その他</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">お問い合わせ内容 *</label>
            <textarea class="form-textarea" name="message" required placeholder="お問い合わせ内容をご記入ください"></textarea>
          </div>
          <button type="submit" class="btn-primary" style="width:100%;font-size:14px;padding:16px">送信する</button>
        </form>

        <div class="contact-info">
          <div
            style="font-family:var(--mono);font-size:10px;letter-spacing:.15em;color:var(--accent2);margin-bottom:24px">
            CONTACT INFO</div>
          <div class="contact-info-item">
            <div class="contact-info-label">電話番号</div>
            <div class="contact-info-value">03-XXXX-XXXX</div>
          </div>
          <div class="contact-info-item">
            <div class="contact-info-label">受付時間</div>
            <div class="contact-info-value">10:00 〜 22:00<br>（年中無休）</div>
          </div>
          <div class="contact-info-item">
            <div class="contact-info-label">メール</div>
            <div class="contact-info-value">info@hal-cinema.jp</div>
          </div>
          <div class="contact-info-item">
            <div class="contact-info-label">住所</div>
            <div class="contact-info-value">〒150-0001<br>東京都渋谷区神宮前1-2-3<br>HALビル</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="footer-root"></div>

  <script src="js/data.js"></script>
  <script src="js/common.js"></script>
  <script src="js/contact.js"></script>
</body>

</html>
