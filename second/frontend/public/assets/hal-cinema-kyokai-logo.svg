<svg width="520" height="120" viewBox="0 0 520 120" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">HALシネマ 境界 ロゴ</title>
  <desc id="desc">細い境界線、粒状ノイズ、微細な文字ずれを組み合わせた、HALシネマ 境界の横長ロゴ。</desc>
  <defs>
    <linearGradient id="markGlow" x1="0" y1="0" x2="92" y2="92" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4A9FD4" stop-opacity="0.34"/>
      <stop offset="0.5" stop-color="#0E1E38" stop-opacity="0.1"/>
      <stop offset="1" stop-color="#4A9FD4" stop-opacity="0.22"/>
    </linearGradient>
    <linearGradient id="boundaryLine" x1="0" y1="18" x2="0" y2="102" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4A9FD4" stop-opacity="0"/>
      <stop offset="0.18" stop-color="#4A9FD4"/>
      <stop offset="0.5" stop-color="#DDE4F0"/>
      <stop offset="0.82" stop-color="#4A9FD4"/>
      <stop offset="1" stop-color="#4A9FD4" stop-opacity="0"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-35%" width="140%" height="170%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="3.2" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.290 0 0 0 0 0.624 0 0 0 0 0.831 0 0 0 0.55 0"/>
      <feBlend in2="SourceGraphic" mode="screen"/>
    </filter>
    <filter id="textGlow" x="-8%" y="-65%" width="116%" height="230%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.290 0 0 0 0 0.624 0 0 0 0 0.831 0 0 0 0.7 0"/>
      <feBlend in2="SourceGraphic" mode="screen"/>
    </filter>
    <filter id="staticNoise" x="20" y="18" width="84" height="84" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="1.15" numOctaves="3" seed="31" result="noise"/>
      <feColorMatrix in="noise" type="matrix" values="0 0 0 0 0.82 0 0 0 0 0.9 0 0 0 0 1 0.95 0 0 0 -0.52"/>
    </filter>
    <clipPath id="markClip">
      <rect x="20" y="18" width="84" height="84" rx="2"/>
    </clipPath>
  </defs>

  <g filter="url(#softGlow)">
    <rect x="20.5" y="18.5" width="83" height="83" rx="2" fill="url(#markGlow)" stroke="#2D64A0"/>
    <path d="M62 18V102" stroke="url(#boundaryLine)" stroke-width="1.4"/>
    <path d="M32 36H52V39H35V58H52V61H32V36Z" fill="#DDE4F0" opacity="0.88"/>
    <path d="M72 36H92V61H72V58H89V39H72V36Z" fill="#DDE4F0" opacity="0.88"/>
    <path d="M36 78H43M48 79H61M72 77H88" stroke="#4A9FD4" stroke-width="1" opacity="0.68"/>
  </g>

  <g clip-path="url(#markClip)">
    <rect x="20" y="18" width="84" height="84" filter="url(#staticNoise)" opacity="0.34"/>
    <g opacity="0.72">
      <rect x="28" y="30" width="18" height="1.2" fill="#DDE4F0" opacity="0.42"/>
      <rect x="71" y="43" width="25" height="1.4" fill="#4A9FD4" opacity="0.58"/>
      <rect x="23" y="57" width="34" height="1" fill="#4A9FD4" opacity="0.28"/>
      <rect x="64" y="70" width="13" height="1.2" fill="#DDE4F0" opacity="0.46"/>
      <rect x="35" y="87" width="52" height="1" fill="#4A9FD4" opacity="0.32"/>
    </g>
  </g>

  <text x="126" y="48" fill="#DDE4F0"
        font-family="'Noto Serif JP', 'Yu Mincho', 'Hiragino Mincho ProN', serif"
        font-size="26" font-weight="700" letter-spacing="0.12em">HALシネマ</text>

  <g>
    <text x="126" y="88" fill="#DDE4F0"
          font-family="'Noto Serif JP', 'Yu Mincho', 'Hiragino Mincho ProN', serif"
          font-size="34" font-weight="700" letter-spacing="0.2em">境界</text>
    <text x="128" y="87" fill="#4A9FD4" fill-opacity="0.32"
          font-family="'Noto Serif JP', 'Yu Mincho', 'Hiragino Mincho ProN', serif"
          font-size="34" font-weight="700" letter-spacing="0.2em">境界</text>
    <text x="124" y="90" fill="#C0392B" fill-opacity="0.18"
          font-family="'Noto Serif JP', 'Yu Mincho', 'Hiragino Mincho ProN', serif"
          font-size="34" font-weight="700" letter-spacing="0.2em">境界</text>
  </g>

  <path d="M250 60H486" stroke="#2D64A0" stroke-opacity="0.58"/>
  <path d="M304 53H344" stroke="#4A9FD4" stroke-width="1" stroke-dasharray="8 6" opacity="0.7"/>
  <path d="M416 67H486" stroke="#4A9FD4" stroke-width="1" stroke-dasharray="2 7" opacity="0.45"/>

  <g filter="url(#textGlow)">
    <text x="252" y="87" fill="#BFD6EA"
          font-family="'DM Mono', 'Consolas', monospace"
          font-size="13" font-weight="500" letter-spacing="0.1em">BETWEEN FEAR AND REALITY</text>
  </g>
</svg>
